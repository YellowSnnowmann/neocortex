services:
  neo4j:
    image: neo4j:5-enterprise
    ports:
      - "7474:7474" # HTTP browser
      - "7687:7687" # Bolt protocol
    environment:
      - NEO4J_AUTH=neo4j/password
      # Accept the license agreement for Enterprise features, required for GDS
      - NEO4J_ACCEPT_LICENSE_AGREEMENT=yes
      # Automatically download and install the GDS and APOC plugins
      - NEO4J_PLUGINS='["graph-data-science", "apoc"]'
      # Configure unrestricted procedures for GDS and APOC
      - NEO4J_dbms_security_procedures_unrestricted=gds.*,apoc.*
      # It is recommended to adjust memory settings based on your system and workload
      # - NEO4J_dbms_memory_heap_initial__size=2G
      # - NEO4J_dbms_memory_heap_max__size=4G
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "password", "RETURN 1"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  neo4j_data:
